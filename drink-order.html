<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>동료장학 음료 주문</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green:#1D9E75; --green-dark:#0F6E56; --green-light:#E1F5EE; --green-mid:#9FE1CB;
    --hot-bg:#FAECE7; --hot-text:#7A2E10; --ice-bg:#E6F1FB; --ice-text:#0C447C;
    --bg:#F7F8FA; --card:#FFFFFF; --border:#EAEAEA;
    --text:#1A1A1A; --text-sub:#777; --text-hint:#AAAAAA;
    --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
  .page{display:none;animation:fadeUp .22s ease}
  .page.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .hero{background:var(--green);padding:2.5rem 1.5rem 3.2rem;position:relative;overflow:hidden;text-align:center}
  .hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
  .hero::after{content:'';position:absolute;bottom:-40px;left:-30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05)}
  .hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:.4rem}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:.25rem}
  .hero-desc{font-size:13px;color:rgba(255,255,255,.7)}
  .hero-date-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:50px;padding:6px 16px;margin-top:.9rem;font-size:14px;font-weight:700;color:#fff}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:7px 13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:1rem}
  .card-lift{background:var(--card);border-radius:24px 24px 0 0;margin-top:-22px;padding:1.75rem 1.25rem 2.5rem;min-height:380px;position:relative;z-index:2}

  .field-label{font-size:12px;font-weight:700;color:var(--text-sub);letter-spacing:.04em;margin-bottom:6px}
  .field-wrap{margin-bottom:1.1rem}
  input[type=text],input[type=number],select{width:100%;padding:14px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:var(--green)}
  input::placeholder{color:var(--text-hint)}

  .date-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
  .date-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:1.1rem .75rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;background:var(--card)}
  .date-card:hover{border-color:var(--green-mid)}
  .date-card.sel{border-color:var(--green);background:var(--green-light)}
  .date-card-month{display:none}
  .date-card-day{font-size:18px;font-weight:700;color:var(--text)}
  .date-card.sel .date-card-day{color:var(--green-dark)}

  .btn-main{width:100%;padding:15px;background:var(--green);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s,transform .1s}
  .btn-main:hover{background:var(--green-dark)}
  .btn-main:active{transform:scale(.98)}
  .btn-main:disabled{background:#D0D0D0;color:#999;cursor:not-allowed;transform:none}
  .btn-ghost{width:100%;padding:13px;background:transparent;color:var(--text-sub);font-size:14px;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;margin-top:.75rem;transition:background .15s}
  .btn-ghost:hover{background:var(--bg)}
  .btn-danger{background:transparent;color:#C0392B;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:1px solid #FBBDB9;border-radius:8px;padding:6px 12px;cursor:pointer;transition:background .15s}
  .btn-danger:hover{background:#FEF2F2}

  .badge-h{background:var(--hot-bg);color:var(--hot-text);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
  .badge-i{background:var(--ice-bg);color:var(--ice-text);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}

  .temp-row{display:flex;gap:8px}
  .tbtn{flex:1;padding:10px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text-sub);cursor:pointer;transition:all .15s}
  .tbtn.hot.on{border-color:#D85A30;background:var(--hot-bg);color:var(--hot-text)}
  .tbtn.ice.on{border-color:#185FA5;background:var(--ice-bg);color:var(--ice-text)}

  .confirm-box{background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius-sm);padding:1rem 1.1rem;margin-top:.75rem;display:none}
  .confirm-row{display:flex;align-items:center;gap:8px}
  .confirm-name{font-size:15px;font-weight:700;color:var(--green-dark)}
  .confirm-price{font-size:13px;color:var(--green);margin-left:auto}

  .done-icon-wrap{width:72px;height:72px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
  .done-icon-wrap svg{width:32px;height:32px;stroke:var(--green);stroke-width:2.5;fill:none}
  .receipt{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:1.25rem}
  .receipt-head{background:var(--bg);padding:.75rem 1rem;font-size:11px;font-weight:700;color:var(--text-hint);letter-spacing:.08em;text-transform:uppercase}
  .receipt-row{display:flex;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:14px}
  .receipt-row:last-child{border-bottom:none}
  .receipt-row span:first-child{color:var(--text-sub)}
  .receipt-row span:last-child{font-weight:700}

  .sec-label{font-size:11px;font-weight:700;color:var(--text-hint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem}
  .tab-bar{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:1.5rem;gap:2px}
  .tab-btn{flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:none;background:transparent;color:var(--text-hint);border-radius:9px;cursor:pointer;transition:all .15s}
  .tab-btn.on{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

  .date-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
  .dftab{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border);background:var(--card);color:var(--text-sub);cursor:pointer;transition:all .15s}
  .dftab.on{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
  .stat-card{background:var(--bg);border-radius:var(--radius-sm);padding:1rem}
  .stat-l{font-size:11px;font-weight:700;color:var(--text-hint);margin-bottom:5px}
  .stat-v{font-size:20px;font-weight:700;color:var(--text)}
  .ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .ocard-l{display:flex;align-items:center;gap:10px}
  .ocard-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green-dark);flex-shrink:0}
  .ocard-name{font-size:14px;font-weight:700;color:var(--text)}
  .ocard-sub{font-size:12px;color:var(--text-sub);margin-top:1px}
  .ocard-r{text-align:right}
  .ocard-cnt{font-size:16px;font-weight:700}
  .ocard-psub{font-size:12px;color:var(--text-hint)}
  .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
  .empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-hint);font-size:14px}
</style>
</head>
<body>
<div class="wrap">

<!-- ── HOME ── -->
<div id="p-home" class="page active">
  <div class="hero">
    <p class="hero-eyebrow">동료장학 협의회</p>
    <h1 class="hero-title">음료 주문 시스템</h1>
    <p class="hero-desc">이름을 입력하고 날짜와 메뉴를 선택해주세요</p>
  </div>
  <div class="card-lift">
    <div class="field-wrap">
      <p class="field-label">이름</p>
      <input type="text" id="h-name" placeholder="홍길동"/>
    </div>
    <button class="btn-main" onclick="goOrder()">다음</button>
    <button class="btn-ghost" onclick="sp('p-admin')">관리자 페이지</button>
  </div>
</div>

<!-- ── DATE SELECT ── -->
<div id="p-date" class="page">
  <div class="hero">
    <button class="back-btn" onclick="sp('p-home')">← 뒤로</button>
    <p class="hero-eyebrow" id="ds-uname"></p>
    <h1 class="hero-title">협의회 날짜 선택</h1>
  </div>
  <div class="card-lift">
    <p class="sec-label">참석하실 날짜를 선택해주세요</p>
    <div class="date-grid" id="date-grid"></div>
    <button class="btn-main" id="btn-date" onclick="goOrderForm()" disabled>선택 완료</button>
  </div>
</div>

<!-- ── ORDER ── -->
<div id="p-order" class="page">
  <div class="hero">
    <button class="back-btn" onclick="sp('p-date')">← 뒤로</button>
    <p class="hero-eyebrow" id="o-uname"></p>
    <div class="hero-date-badge" id="o-datebadge"></div>
  </div>
  <div class="card-lift">
    <p class="sec-label">주문 정보 입력</p>
    <div class="field-wrap">
      <p class="field-label">마시고 싶은 음료 이름</p>
      <input type="text" id="o-menuname" placeholder="예) 아이스 아메리카노" oninput="updBtn()"/>
    </div>
    <div class="field-wrap">
      <p class="field-label">온도</p>
      <div class="temp-row">
        <button class="tbtn hot" id="tbtn-hot" onclick="pickTemp('hot')">HOT</button>
        <button class="tbtn ice" id="tbtn-ice" onclick="pickTemp('ice')">ICE</button>
      </div>
    </div>
    <div class="field-wrap">
      <p class="field-label">가격 (원)</p>
      <input type="number" id="o-price" placeholder="예) 5500" oninput="updBtn()"/>
    </div>
    <div id="confirm-box" class="confirm-box">
      <div class="confirm-row">
        <span class="confirm-name" id="c-name"></span>
        <span id="c-badge"></span>
        <span class="confirm-price" id="c-price"></span>
      </div>
    </div>
    <div style="margin-top:1.25rem">
      <button class="btn-main" id="btn-sub" onclick="doSubmit()" disabled>주문 완료</button>
    </div>
  </div>
</div>

<!-- ── DONE ── -->
<div id="p-done" class="page">
  <div class="hero">
    <p class="hero-eyebrow">주문 완료</p>
    <h1 class="hero-title">감사합니다!</h1>
    <p class="hero-desc">주문이 정상적으로 접수되었습니다</p>
  </div>
  <div class="card-lift" style="text-align:center">
    <div class="done-icon-wrap">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <p style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:.25rem" id="d-name"></p>
    <div class="receipt">
      <div class="receipt-head">주문 내역</div>
      <div class="receipt-row"><span>날짜</span><span id="d-date"></span></div>
      <div class="receipt-row"><span>메뉴</span><span id="d-menu"></span></div>
      <div class="receipt-row"><span>온도</span><span id="d-temp"></span></div>
      <div class="receipt-row"><span>금액</span><span id="d-price"></span></div>
    </div>
    <button class="btn-ghost" onclick="sp('p-home')" style="margin-top:1rem">처음으로</button>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="p-admin" class="page">
  <div class="hero">
    <button class="back-btn" onclick="sp('p-home')">← 뒤로</button>
    <p class="hero-eyebrow">관리자</p>
    <h1 class="hero-title">주문 관리</h1>
  </div>
  <div class="card-lift">
    <div class="tab-bar">
      <button class="tab-btn on" onclick="stab('t-orders',this)">주문 현황</button>
      <button class="tab-btn" onclick="stab('t-summary',this)">품목 합계</button>
    </div>

    <!-- 주문 현황 탭 -->
    <div id="t-orders">
      <p class="sec-label">날짜 선택</p>
      <div class="date-filter" id="admin-date-filter"></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-l">주문 인원</div><div class="stat-v" id="st-ppl">-</div></div>
        <div class="stat-card"><div class="stat-l">음료 합계</div><div class="stat-v" id="st-total">-</div></div>
      </div>
      <p class="sec-label">선생님별 내역</p>
      <div id="o-people"></div>
      <div class="divider"></div>
      <button class="btn-danger" style="width:100%;padding:11px;border-radius:10px" onclick="clearAll()">주문 전체 초기화</button>
    </div>

    <!-- 품목 합계 탭 -->
    <div id="t-summary" style="display:none">
      <p class="sec-label">날짜 선택</p>
      <div class="date-filter" id="summary-date-filter"></div>
      <p class="sec-label">품목별 수량</p>
      <div id="o-items"></div>
    </div>
  </div>
</div>

</div><!-- .wrap -->
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMWPC3CepgeBKyl_DcIf5NWwnNmmQVG5fjnlSMEkb9EBTkZcJnMB3i7JvDxGKk9Duu/exec';

const DATES = [
  {label:'4월 16일', month:'4월', day:'16일', value:'0416'},
  {label:'4월 17일', month:'4월', day:'17일', value:'0417'},
  {label:'5월 13일', month:'5월', day:'13일', value:'0513'},
  {label:'6월 9일',  month:'6월', day:'9일',  value:'0609'},
  {label:'6월 11일', month:'6월', day:'11일', value:'0611'},
];

let orders=[], curUser='', selDate=null, selTemp=null;
let aFilter='all', sFilter='all';

/* ── JSONP ── */
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const s  = document.createElement('script');
    const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);
    function cleanup() { clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s); }
    window[cb] = d => { cleanup(); resolve(d); };
    params.callback = cb;
    s.src = SCRIPT_URL + '?' + Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    s.onerror = () => { cleanup(); reject(new Error('error')); };
    document.body.appendChild(s);
  });
}

async function savO(e)      { await jsonp({action:'submit', name:e.name, date:e.date, menuName:e.menuName, temp:e.temp, price:e.price}); }
async function fetchOrders(){ const d = await jsonp({action:'getOrders'}); orders = d.status==='ok' ? d.orders : []; }

/* ── 페이지 전환 ── */
function sp(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'p-date')  renderDateGrid();
  if (id === 'p-admin') { renderFilters(); loadOrders(); }
}

function stab(tid, btn) {
  ['t-orders','t-summary'].forEach(t => document.getElementById(t).style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(tid).style.display = 'block';
  btn.classList.add('on');
  if (tid === 't-orders')  loadOrders();
  if (tid === 't-summary') loadSummary();
}

/* ── 홈 ── */
function goOrder() {
  const n = document.getElementById('h-name').value.trim();
  if (!n) { alert('이름을 입력해주세요.'); return; }
  curUser = n; selDate = null;
  document.getElementById('ds-uname').textContent = n + ' 선생님';
  sp('p-date');
}

/* ── 날짜 선택 ── */
function renderDateGrid() {
  document.getElementById('date-grid').innerHTML = DATES.map(d => `
    <div class="date-card ${selDate===d.value?'sel':''}" onclick="pickDate('${d.value}')">
      <div class="date-card-day">${d.label}</div>
    </div>`).join('');
  document.getElementById('btn-date').disabled = !selDate;
}

function pickDate(v) { selDate = v; renderDateGrid(); }

function goOrderForm() {
  if (!selDate) return;
  selTemp = null;
  const d = DATES.find(x => x.value === selDate);
  document.getElementById('o-uname').textContent   = curUser + ' 선생님';
  document.getElementById('o-datebadge').textContent = d.label;
  document.getElementById('o-menuname').value = '';
  document.getElementById('o-price').value    = '';
  document.getElementById('tbtn-hot').classList.remove('on');
  document.getElementById('tbtn-ice').classList.remove('on');
  document.getElementById('confirm-box').style.display = 'none';
  document.getElementById('btn-sub').disabled = true;
  sp('p-order');
}

/* ── 주문 입력 ── */
function pickTemp(t) {
  selTemp = t;
  document.getElementById('tbtn-hot').classList.toggle('on', t==='hot');
  document.getElementById('tbtn-ice').classList.toggle('on', t==='ice');
  updConfirm(); updBtn();
}

function updConfirm() {
  const nm = document.getElementById('o-menuname').value.trim();
  const pr = parseInt(document.getElementById('o-price').value);
  const bx = document.getElementById('confirm-box');
  if (!nm || !selTemp || isNaN(pr) || pr<=0) { bx.style.display='none'; return; }
  bx.style.display = 'block';
  document.getElementById('c-name').textContent  = nm;
  document.getElementById('c-price').textContent = pr.toLocaleString()+'원';
  document.getElementById('c-badge').innerHTML   = selTemp==='hot'
    ? '<span class="badge-h">HOT</span>' : '<span class="badge-i">ICE</span>';
}

function updBtn() {
  const nm = document.getElementById('o-menuname').value.trim();
  const pr = parseInt(document.getElementById('o-price').value);
  document.getElementById('btn-sub').disabled = !(nm && selTemp && !isNaN(pr) && pr>0);
  updConfirm();
}

async function doSubmit() {
  const nm = document.getElementById('o-menuname').value.trim();
  const pr = parseInt(document.getElementById('o-price').value);
  if (!nm || !selTemp || isNaN(pr) || pr<=0) return;
  const d   = DATES.find(x => x.value === selDate);
  const ent = {name:curUser, date:d.label, menuName:nm, temp:selTemp, tl:selTemp==='hot'?'HOT':'ICE', price:pr};
  const btn = document.getElementById('btn-sub');
  btn.disabled=true; btn.textContent='전송 중...';
  try {
    await savO(ent);
    document.getElementById('d-name').textContent  = curUser+' 선생님';
    document.getElementById('d-date').textContent  = d.label;
    document.getElementById('d-menu').textContent  = nm;
    document.getElementById('d-temp').innerHTML    = selTemp==='hot'?'<span class="badge-h">HOT</span>':'<span class="badge-i">ICE</span>';
    document.getElementById('d-price').textContent = pr.toLocaleString()+'원';
    btn.disabled=false; btn.textContent='주문 완료';
    sp('p-done');
  } catch(e) {
    alert('전송 중 오류가 발생했습니다.\nApps Script URL을 확인해주세요.');
    btn.disabled=false; btn.textContent='주문 완료';
  }
}

/* ── 관리자 필터 ── */
function renderFilters() {
  const tabs = [{label:'전체',value:'all'}, ...DATES];
  document.getElementById('admin-date-filter').innerHTML = tabs.map(d =>
    `<button class="dftab ${aFilter===d.value?'on':''}" onclick="setAFilter('${d.value}')">${d.label}</button>`).join('');
  document.getElementById('summary-date-filter').innerHTML = tabs.map(d =>
    `<button class="dftab ${sFilter===d.value?'on':''}" onclick="setSFilter('${d.value}')">${d.label}</button>`).join('');
}

function setAFilter(v) { aFilter=v; renderFilters(); rOrders(); }
function setSFilter(v) { sFilter=v; renderFilters(); rSummary(); }

function filtered(f) {
  if (f==='all') return orders;
  const lbl = DATES.find(d=>d.value===f)?.label;
  return orders.filter(o => o.date === lbl);
}

/* ── 관리자 데이터 로딩 ── */
async function loadOrders() {
  document.getElementById('o-people').innerHTML = '<div class="empty-state">불러오는 중...</div>';
  try { await fetchOrders(); rOrders(); }
  catch(e) { document.getElementById('o-people').innerHTML = '<div class="empty-state">불러오지 못했습니다.<br>Apps Script URL을 확인해주세요.</div>'; }
}

async function loadSummary() {
  document.getElementById('o-items').innerHTML = '<div class="empty-state">불러오는 중...</div>';
  try { await fetchOrders(); rSummary(); }
  catch(e) { document.getElementById('o-items').innerHTML = '<div class="empty-state">불러오지 못했습니다.</div>'; }
}

/* ── 주문 현황 렌더 ── */
function rOrders() {
  const list = filtered(aFilter);
  document.getElementById('st-ppl').textContent   = list.length+'명';
  document.getElementById('st-total').textContent = list.reduce((s,o)=>s+Number(o.price),0).toLocaleString()+'원';
  const el = document.getElementById('o-people');
  if (!list.length) { el.innerHTML='<div class="empty-state">주문 내역이 없습니다.</div>'; return; }
  el.innerHTML = list.map(o=>`
    <div class="ocard">
      <div class="ocard-l">
        <div class="ocard-avatar">${o.name[0]}</div>
        <div>
          <div class="ocard-name">${o.name} 선생님</div>
          <div class="ocard-sub">${o.date}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;text-align:right">
        ${o.temp==='hot'?'<span class="badge-h">HOT</span>':'<span class="badge-i">ICE</span>'}
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${o.menuName}</div>
          <div class="ocard-psub">${Number(o.price).toLocaleString()}원</div>
        </div>
      </div>
    </div>`).join('');
}

/* ── 품목 합계 렌더 ── */
function rSummary() {
  const list = filtered(sFilter);
  const cm = {};
  list.forEach(o => {
    const k = o.temp+'||'+o.menuName;
    if (!cm[k]) cm[k]={count:0,price:Number(o.price),temp:o.temp,name:o.menuName};
    cm[k].count++;
  });
  const el = document.getElementById('o-items');
  if (!list.length) { el.innerHTML='<div class="empty-state">주문 내역이 없습니다.</div>'; return; }
  el.innerHTML = Object.values(cm).map(v=>`
    <div class="ocard">
      <div class="ocard-l">
        ${v.temp==='hot'?'<span class="badge-h">HOT</span>':'<span class="badge-i">ICE</span>'}
        <div>
          <div class="ocard-name">${v.name}</div>
          <div class="ocard-sub">${v.price.toLocaleString()}원/잔</div>
        </div>
      </div>
      <div class="ocard-r">
        <div class="ocard-cnt">${v.count}잔</div>
        <div class="ocard-psub">${(v.count*v.price).toLocaleString()}원</div>
      </div>
    </div>`).join('');
}

/* ── 초기화 ── */
async function clearAll() {
  if (!confirm('모든 주문을 초기화하시겠습니까?')) return;
  try { await jsonp({action:'clear'}); orders=[]; rOrders(); }
  catch(e) { alert('초기화 중 오류가 발생했습니다.'); }
}
</script>
